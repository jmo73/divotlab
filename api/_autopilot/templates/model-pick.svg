<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs><style>{{FONTS}}</style></defs>
  <rect width="1080" height="1080" fill="#0A0A0A"/>

  <!-- Logo -->
  <g transform="translate(60, 44)">
    <line x1="0" y1="14" x2="28" y2="14" stroke="#FAFAFA" stroke-width="1.4"/>
    <path d="M2 14 C6 14,10 24,14 24 S22 14,26 14" fill="rgba(250,250,250,0.12)" stroke="#FAFAFA" stroke-width="1.2"/>
    <circle cx="14" cy="7" r="4" fill="#FAFAFA"/>
    <text x="36" y="10" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="2" fill="#FAFAFA">DIVOT</text>
    <text x="36" y="22" font-family="DM Sans" font-size="11" font-weight="300" letter-spacing="2" fill="rgba(250,250,250,0.4)">LAB</text>
  </g>

  <!-- Badge (hardcoded) -->
  <rect x="848" y="30" width="172" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="934" y="49" font-family="DM Sans" font-size="10" font-weight="600" letter-spacing="0.12em" fill="rgba(245,245,243,0.4)" text-anchor="middle">MODEL PICKS</text>

  <!-- Header rule -->
  <line x1="60" y1="82" x2="1020" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Event + context -->
  <text x="60" y="132" font-family="DM Sans" font-size="26" font-weight="600" fill="#F5F5F3">{{EVENT_NAME}}</text>
  <text x="60" y="160" font-family="DM Sans" font-size="14" font-weight="400" fill="rgba(245,245,243,0.35)">{{CONDITIONS_SUMMARY}}</text>

  <!-- Pick 1 -->
  <line x1="60" y1="196" x2="1020" y2="196" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="60" y="248" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#5BBF85">NO. 1</text>
  <text x="60" y="282" font-family="DM Sans" font-size="26" font-weight="600" fill="#F5F5F3">{{P1_NAME}}</text>
  <text x="1020" y="248" font-family="JetBrains Mono" font-size="18" font-weight="400" fill="#5BBF85" text-anchor="end">{{P1_WIN_PCT}} TOP 10</text>
  <text x="60" y="308" font-family="DM Sans" font-size="13" font-weight="400" fill="rgba(245,245,243,0.35)">{{P1_KEY_STRENGTH}}</text>

  <!-- Pick 2 -->
  <line x1="60" y1="342" x2="1020" y2="342" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="60" y="394" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="0.1em" fill="rgba(245,245,243,0.4)">NO. 2</text>
  <text x="60" y="428" font-family="DM Sans" font-size="26" font-weight="600" fill="#F5F5F3">{{P2_NAME}}</text>
  <text x="1020" y="394" font-family="JetBrains Mono" font-size="18" font-weight="400" fill="rgba(245,245,243,0.5)" text-anchor="end">{{P2_WIN_PCT}} TOP 10</text>
  <text x="60" y="454" font-family="DM Sans" font-size="13" font-weight="400" fill="rgba(245,245,243,0.28)">{{P2_KEY_STRENGTH}}</text>

  <!-- Pick 3 -->
  <line x1="60" y1="488" x2="1020" y2="488" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="60" y="540" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">NO. 3</text>
  <text x="60" y="574" font-family="DM Sans" font-size="26" font-weight="600" fill="#F5F5F3">{{P3_NAME}}</text>
  <text x="1020" y="540" font-family="JetBrains Mono" font-size="18" font-weight="400" fill="rgba(245,245,243,0.35)" text-anchor="end">{{P3_WIN_PCT}} TOP 10</text>
  <text x="60" y="600" font-family="DM Sans" font-size="13" font-weight="400" fill="rgba(245,245,243,0.22)">{{P3_KEY_STRENGTH}}</text>

  <!-- Dark horse -->
  <line x1="60" y1="638" x2="1020" y2="638" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="60" y="656" width="2" height="76" fill="#C9A84C" opacity="0.7"/>
  <text x="80" y="674" font-family="DM Sans" font-size="10" font-weight="600" letter-spacing="0.12em" fill="rgba(201,168,76,0.7)">DARK HORSE</text>
  <text x="80" y="706" font-family="DM Sans" font-size="26" font-weight="600" fill="#C9A84C">{{DH_NAME}}</text>
  <text x="80" y="730" font-family="DM Sans" font-size="14" font-weight="400" fill="rgba(245,245,243,0.35)">{{DH_REASON}}</text>

  <!-- Footer -->
  <line x1="60" y1="978" x2="1020" y2="978" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="540" y="1016" font-family="DM Sans" font-size="11" font-weight="400" letter-spacing="0.1em" fill="rgba(245,245,243,0.18)" text-anchor="middle">DIVOT LAB · DIVOTLAB.COM</text>
</svg>
