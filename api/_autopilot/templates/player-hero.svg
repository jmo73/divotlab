<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs><style>{{FONTS}}</style></defs>
  <!-- Full background -->
  <rect width="1080" height="1350" fill="#0A0A0A"/>

  <!-- TOP ZONE (y 0-660): dark placeholder — Sharp composites player photo here.
       Gradient overlay is composited separately on top of the photo.
       Logo watermark appears through the gradient. -->
  <text x="60" y="56" font-family="DM Sans" font-size="10" font-weight="600" letter-spacing="0.18em" fill="rgba(245,245,243,0.35)">DIVOT LAB</text>
  <rect x="148" y="40" width="1" height="18" fill="rgba(245,245,243,0.15)"/>
  <text x="158" y="56" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.14em" fill="rgba(245,245,243,0.25)">GOLF ANALYTICS</text>

  <!-- Content zone separator -->
  <line x1="0" y1="660" x2="1080" y2="660" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Player name + score on same line -->
  <text x="60" y="740" font-family="DM Sans" font-size="38" font-weight="600" fill="#F5F5F3">{{PLAYER_NAME}}</text>
  <text x="1020" y="740" font-family="JetBrains Mono" font-size="44" font-weight="400" fill="{{SCORE_COLOR}}" text-anchor="end">{{SCORE}}</text>

  <!-- Tournament + position -->
  <text x="60" y="774" font-family="DM Sans" font-size="15" font-weight="400" fill="rgba(245,245,243,0.38)">{{TOURNAMENT}}</text>
  <text x="1020" y="774" font-family="DM Sans" font-size="15" font-weight="400" fill="rgba(245,245,243,0.38)" text-anchor="end">{{POSITION}}</text>

  <!-- SG stats strip -->
  <line x1="60" y1="808" x2="1020" y2="808" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="60" y="848" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG TOTAL</text>
  <text x="60" y="884" font-family="JetBrains Mono" font-size="40" font-weight="400" fill="#5BBF85">{{SG_TOTAL}}</text>

  <line x1="390" y1="820" x2="390" y2="898" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="420" y="848" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG APPROACH</text>
  <text x="420" y="884" font-family="JetBrains Mono" font-size="40" font-weight="400" fill="rgba(245,245,243,0.7)">{{SG_APPROACH}}</text>

  <line x1="750" y1="820" x2="750" y2="898" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="780" y="848" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG PUTTING</text>
  <text x="780" y="884" font-family="JetBrains Mono" font-size="40" font-weight="400" fill="rgba(245,245,243,0.7)">{{SG_PUTTING}}</text>

  <line x1="60" y1="912" x2="1020" y2="912" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Footer -->
  <line x1="60" y1="1290" x2="1020" y2="1290" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="540" y="1328" font-family="DM Sans" font-size="11" font-weight="400" letter-spacing="0.1em" fill="rgba(245,245,243,0.18)" text-anchor="middle">DIVOT LAB · DIVOTLAB.COM</text>
</svg>
