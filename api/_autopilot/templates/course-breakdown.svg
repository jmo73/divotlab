<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs><style>{{FONTS}}</style></defs>
  <rect width="1080" height="1080" fill="#0A0A0A"/>

  <!-- Logo -->
  <g transform="translate(60, 44)">
    <line x1="0" y1="14" x2="28" y2="14" stroke="#FAFAFA" stroke-width="1.4"/>
    <path d="M2 14 C6 14,10 24,14 24 S22 14,26 14" fill="rgba(250,250,250,0.12)" stroke="#FAFAFA" stroke-width="1.2"/>
    <circle cx="14" cy="7" r="4" fill="#FAFAFA"/>
    <text x="36" y="10" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="2" fill="#FAFAFA">DIVOT</text>
    <text x="36" y="22" font-family="DM Sans" font-size="11" font-weight="300" letter-spacing="2" fill="rgba(250,250,250,0.4)">LAB</text>
  </g>

  <!-- Badge (hardcoded) -->
  <rect x="848" y="30" width="172" height="28" rx="2" fill="none" stroke="rgba(91,191,133,0.25)" stroke-width="1"/>
  <text x="934" y="49" font-family="DM Sans" font-size="10" font-weight="600" letter-spacing="0.12em" fill="rgba(91,191,133,0.6)" text-anchor="middle">COURSE PROFILE</text>

  <!-- Header rule -->
  <line x1="60" y1="82" x2="1020" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Course name -->
  <text x="60" y="148" font-family="DM Sans" font-size="34" font-weight="600" fill="#F5F5F3">{{COURSE_NAME}}</text>
  <text x="60" y="180" font-family="DM Sans" font-size="15" font-weight="400" fill="rgba(245,245,243,0.35)">{{COURSE_META}}</text>

  <!-- Section rule -->
  <line x1="60" y1="210" x2="1020" y2="210" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stats: 2×2 grid without card backgrounds -->
  <!-- Top-left: Rewards -->
  <text x="60" y="256" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">REWARDS</text>
  <text x="60" y="306" font-family="JetBrains Mono" font-size="32" font-weight="400" fill="#5BBF85">{{REWARDS_LABEL}}</text>
  <line x1="60" y1="330" x2="490" y2="330" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Top-right: Historical scoring -->
  <text x="570" y="256" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">HIST. WINNING SCORE</text>
  <text x="570" y="306" font-family="JetBrains Mono" font-size="32" font-weight="400" fill="rgba(245,245,243,0.8)">{{HIST_SCORING}}</text>
  <line x1="570" y1="330" x2="1020" y2="330" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Vertical divider (top section) -->
  <line x1="530" y1="230" x2="530" y2="330" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Bottom-left: Field avg -->
  <text x="60" y="376" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">FIELD AVG</text>
  <text x="60" y="426" font-family="JetBrains Mono" font-size="32" font-weight="400" fill="rgba(245,245,243,0.7)">{{FIELD_AVG}}</text>
  <line x1="60" y1="450" x2="490" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Bottom-right: Key stat -->
  <text x="570" y="376" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">KEY STAT</text>
  <text x="570" y="426" font-family="JetBrains Mono" font-size="26" font-weight="400" fill="#C9A84C">{{KEY_STAT}}</text>
  <line x1="570" y1="450" x2="1020" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Vertical divider (bottom section) -->
  <line x1="530" y1="348" x2="530" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Insight block -->
  <rect x="60" y="480" width="2" height="88" fill="#5BBF85" opacity="0.6"/>
  <text x="80" y="514" font-family="DM Sans" font-size="18" font-weight="500" fill="rgba(245,245,243,0.8)">{{INSIGHT_LINE_1}}</text>
  <text x="80" y="540" font-family="DM Sans" font-size="18" font-weight="400" fill="rgba(245,245,243,0.5)">{{INSIGHT_LINE_2}}</text>

  <!-- Historical hook -->
  <text x="60" y="610" font-family="DM Sans" font-size="14" font-weight="400" fill="rgba(245,245,243,0.28)">{{HISTORICAL_HOOK}}</text>

  <!-- Footer -->
  <line x1="60" y1="978" x2="1020" y2="978" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="540" y="1016" font-family="DM Sans" font-size="11" font-weight="400" letter-spacing="0.1em" fill="rgba(245,245,243,0.18)" text-anchor="middle">DIVOT LAB · DIVOTLAB.COM</text>
</svg>
