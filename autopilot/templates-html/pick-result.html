<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 85% 55% at 50% 42%, {{RESULT_BG}} 0%, transparent 60%),
      #0A0A0A;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, Helvetica, sans-serif;
    color: #F5F5F3;
    padding: 60px 64px 52px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 760px;
    height: 760px;
    opacity: 0.028;
    pointer-events: none;
    color: #F5F5F3;
  }

  /* ── Header ──────────────────────────────────────────────────────────── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .logo { display: flex; align-items: center; gap: 13px; }

  .logo-wordmark {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.13em;
    color: rgba(245,245,243,0.95);
    line-height: 1;
  }
  .logo-wordmark span { font-weight: 300; opacity: 0.55; }

  .round-label {
    display: flex;
    align-items: center;
    gap: 11px;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: {{RESULT_COLOR}};
    text-transform: uppercase;
    opacity: 0.9;
  }
  .round-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: {{RESULT_COLOR}};
    opacity: 0.8;
    flex-shrink: 0;
  }

  /* ── Tournament label ─────────────────────────────────────────────────── */
  .tournament {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 400;
    color: rgba(245,245,243,0.32);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  /* ── Player identity ──────────────────────────────────────────────────── */
  .player-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 90px;
    font-weight: 600;
    font-style: normal;
    letter-spacing: -0.02em;
    color: rgba(245,245,243,0.97);
    line-height: 0.93;
    margin-bottom: 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .bet-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 400;
    color: rgba(245,245,243,0.42);
    letter-spacing: 0.04em;
    margin-bottom: 40px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  /* ── Result hero ──────────────────────────────────────────────────────── */
  .result-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 40px 0;
    position: relative;
    z-index: 1;
    min-height: 0;
  }

  .result-word {
    font-family: 'DM Sans', sans-serif;
    font-size: 168px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.88;
    color: {{RESULT_COLOR}};
    display: block;
  }

  .result-detail {
    font-size: 32px;
    font-weight: 400;
    color: rgba(245,245,243,0.52);
    margin-top: 28px;
    letter-spacing: 0.02em;
    line-height: 1.45;
  }

  /* ── Season stats row ─────────────────────────────────────────────────── */
  .season-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .season-cell {
    padding: 30px 0;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .season-cell:last-child { border-right: none; }
  .season-cell:not(:first-child) { padding-left: 32px; }

  .season-label {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(245,245,243,0.32);
    margin-bottom: 12px;
  }

  .season-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 46px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: rgba(245,245,243,0.88);
    line-height: 1;
  }

  /* ── Insight ──────────────────────────────────────────────────────────── */
  .insight {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-top: 28px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .insight-bar {
    width: 3px; height: 48px;
    background: {{RESULT_COLOR}};
    flex-shrink: 0;
    border-radius: 1px;
    opacity: 0.75;
  }

  .insight-text {
    font-size: 26px;
    font-weight: 400;
    color: rgba(245,245,243,0.62);
    line-height: 1.6;
  }

  /* ── Footer ───────────────────────────────────────────────────────────── */
  .footer {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.07);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(245,245,243,0.28);
    text-align: center;
    text-transform: uppercase;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<svg class="watermark" viewBox="0 0 72 72" fill="none">
  <line x1="4" y1="36.5" x2="68" y2="36.5" stroke="currentColor" stroke-width="3.2"/>
  <path d="M10 36.5 C18 36.5,26 60.5,36 60.5 S54 36.5,62 36.5" fill="currentColor" fill-opacity=".4"/>
  <path d="M10 36.5 C18 36.5,26 60.5,36 60.5 S54 36.5,62 36.5" stroke="currentColor" stroke-width="2.8" fill="none"/>
  <circle cx="36" cy="20.5" r="9" fill="currentColor"/>
</svg>

<div class="header">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 72 72" fill="none" style="color:#5BBF85">
      <line x1="4" y1="36.5" x2="68" y2="36.5" stroke="currentColor" stroke-width="3.2"/>
      <path d="M10 36.5 C18 36.5,26 60.5,36 60.5 S54 36.5,62 36.5" fill="currentColor" fill-opacity=".18"/>
      <path d="M10 36.5 C18 36.5,26 60.5,36 60.5 S54 36.5,62 36.5" stroke="currentColor" stroke-width="2.8" fill="none"/>
      <circle cx="36" cy="20.5" r="9" fill="currentColor"/>
    </svg>
    <span class="logo-wordmark">DIVOT <span>LAB</span></span>
  </div>
  <div class="round-label"><div class="round-dot"></div>{{BADGE}}</div>
</div>

<div class="tournament">{{TOURNAMENT}}</div>
<div class="player-name">{{PLAYER_NAME}}</div>
<div class="bet-line">{{BET_LINE}}</div>

<div class="result-hero">
  <span class="result-word">{{RESULT}}</span>
  <div class="result-detail">{{RESULT_DETAIL}}</div>
</div>

<div class="season-row">
  <div class="season-cell">
    <div class="season-label">Record</div>
    <div class="season-value">{{SEASON_RECORD}}</div>
  </div>
  <div class="season-cell">
    <div class="season-label">Units</div>
    <div class="season-value">{{SEASON_UNITS}}</div>
  </div>
  <div class="season-cell">
    <div class="season-label">ROI</div>
    <div class="season-value">{{SEASON_ROI}}</div>
  </div>
</div>

<div class="insight">
  <div class="insight-bar"></div>
  <div class="insight-text">{{INSIGHT}}</div>
</div>

<div class="footer">Divot Lab &middot; divotlab.com</div>

</body>
</html>
