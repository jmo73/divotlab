<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs><style>{{FONTS}}</style></defs>
  <rect width="1080" height="1080" fill="#0A0A0A"/>

  <!-- Logo -->
  <g transform="translate(60, 44)">
    <line x1="0" y1="14" x2="28" y2="14" stroke="#FAFAFA" stroke-width="1.4"/>
    <path d="M2 14 C6 14,10 24,14 24 S22 14,26 14" fill="rgba(250,250,250,0.12)" stroke="#FAFAFA" stroke-width="1.2"/>
    <circle cx="14" cy="7" r="4" fill="#FAFAFA"/>
    <text x="36" y="10" font-family="DM Sans" font-size="11" font-weight="600" letter-spacing="2" fill="#FAFAFA">DIVOT</text>
    <text x="36" y="22" font-family="DM Sans" font-size="11" font-weight="300" letter-spacing="2" fill="rgba(250,250,250,0.4)">LAB</text>
  </g>

  <!-- Badge (hardcoded) -->
  <rect x="848" y="30" width="172" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="934" y="49" font-family="DM Sans" font-size="10" font-weight="600" letter-spacing="0.12em" fill="rgba(245,245,243,0.4)" text-anchor="middle">HEAD TO HEAD</text>

  <!-- Header rule -->
  <line x1="60" y1="82" x2="1020" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Event + round -->
  <text x="60" y="132" font-family="DM Sans" font-size="16" font-weight="400" fill="rgba(245,245,243,0.4)">{{EVENT_ROUND}}</text>

  <!-- Vertical center divider -->
  <line x1="540" y1="148" x2="540" y2="880" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Player A — name -->
  <text x="60" y="196" font-family="DM Sans" font-size="24" font-weight="600" fill="#F5F5F3">{{A_NAME}}</text>
  <!-- Player A — score hero -->
  <text x="60" y="300" font-family="JetBrains Mono" font-size="80" font-weight="400" fill="{{A_SCORE_COLOR}}">{{A_SCORE}}</text>
  <!-- Player A — position -->
  <text x="60" y="334" font-family="DM Sans" font-size="16" font-weight="400" fill="rgba(245,245,243,0.38)">{{A_POSITION}}</text>

  <!-- Player A stats -->
  <line x1="60" y1="366" x2="510" y2="366" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="60" y="398" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG TOTAL</text>
  <text x="60" y="434" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{A_SG_TOTAL}}</text>
  <line x1="60" y1="460" x2="510" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="60" y="492" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG APPROACH</text>
  <text x="60" y="528" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{A_SG_APPROACH}}</text>
  <line x1="60" y1="554" x2="510" y2="554" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="60" y="586" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">DG RATING</text>
  <text x="60" y="622" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{A_DG_RATING}}</text>

  <!-- Player B — name -->
  <text x="570" y="196" font-family="DM Sans" font-size="24" font-weight="600" fill="#F5F5F3">{{B_NAME}}</text>
  <!-- Player B — score hero -->
  <text x="570" y="300" font-family="JetBrains Mono" font-size="80" font-weight="400" fill="{{B_SCORE_COLOR}}">{{B_SCORE}}</text>
  <!-- Player B — position -->
  <text x="570" y="334" font-family="DM Sans" font-size="16" font-weight="400" fill="rgba(245,245,243,0.38)">{{B_POSITION}}</text>

  <!-- Player B stats -->
  <line x1="570" y1="366" x2="1020" y2="366" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="570" y="398" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG TOTAL</text>
  <text x="570" y="434" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{B_SG_TOTAL}}</text>
  <line x1="570" y1="460" x2="1020" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="570" y="492" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">SG APPROACH</text>
  <text x="570" y="528" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{B_SG_APPROACH}}</text>
  <line x1="570" y1="554" x2="1020" y2="554" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="570" y="586" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.1em" fill="rgba(245,245,243,0.28)">DG RATING</text>
  <text x="570" y="622" font-family="JetBrains Mono" font-size="36" font-weight="400" fill="rgba(245,245,243,0.9)">{{B_DG_RATING}}</text>

  <!-- Comparison angle -->
  <line x1="60" y1="660" x2="1020" y2="660" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="60" y="706" font-family="DM Sans" font-size="17" font-weight="400" fill="rgba(245,245,243,0.6)">{{COMPARISON_ANGLE}}</text>

  <!-- Footer -->
  <line x1="60" y1="978" x2="1020" y2="978" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="540" y="1016" font-family="DM Sans" font-size="11" font-weight="400" letter-spacing="0.1em" fill="rgba(245,245,243,0.18)" text-anchor="middle">DIVOT LAB · DIVOTLAB.COM</text>
</svg>
